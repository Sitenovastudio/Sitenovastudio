<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteNova Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="music/song.mp3" type="audio/mpeg">
  </audio>

  <button class="music-btn" id="musicBtn">🔊</button>

  <!-- Navbar -->
  <header>
    <div class="logo">SiteNova Studio</div>

    <nav>
      <a href="#home">Home</a>
      <a href="#services">Services</a>
      <a href="#portfolio">Portfolio</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero" id="home">

    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Luxury Digital Experiences</h1>

      <p>
        We create premium websites, wedding invitations,
        landing pages, event experiences and digital brands.
      </p>

      <div class="hero-buttons">
        <a href="#portfolio" class="btn primary">View Portfolio</a>
        <a href="https://t.me" class="btn secondary">Contact on Telegram</a>
      </div>
    </div>
  </section>

  <!-- Services -->
  <section class="services" id="services">

    <div class="section-title">
      <h2>Our Services</h2>
</html>
